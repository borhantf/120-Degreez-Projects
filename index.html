<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#d90445">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="120 Degreez">
  <title>120 Degreez Project Manager</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="header">
      <img class="brand-mark" src="./logo.png" alt="120 Degreez logo">
      <div class="brand-copy">
        <h1>120 Degreez Project Manager</h1>
        <p class="company-line">+1 619 323 1515</p>
        <p class="company-line">www.120degreez.com</p>
        <p class="company-line">225 Broadway St, Suite 350, San Diego, CA 92101</p>
      </div>
    </header>

    <section class="dashboard" aria-label="Project overview">
      <article class="card">
        <span class="card-label">Total Projects</span>
        <strong class="card-value" id="dashTotal">0</strong>
        <span class="card-sub">Loaded</span>
      </article>
      <article class="card">
        <span class="card-label">Favorites</span>
        <strong class="card-value" id="dashFav">0</strong>
        <span class="card-sub">Saved</span>
      </article>
      <article class="card">
        <span class="card-label">Recent</span>
        <strong class="card-value" id="dashRecent">None</strong>
        <span class="card-sub">Latest opened</span>
      </article>
      <article class="card">
        <span class="card-label">Selected</span>
        <strong class="card-value" id="dashSelected">None</strong>
        <span class="card-sub">Current row</span>
      </article>
    </section>

    <section class="toolbar">
      <div class="toolbar-group">
        <label class="toolbar-title" for="searchBox">Project Search</label>
        <div class="search-wrap">
          <input id="searchBox" type="search" placeholder="Search projects">
          <button id="clearSearchBtn" class="icon-btn" type="button" aria-label="Clear search">x</button>
        </div>
      </div>
      <div class="toolbar-group toolbar-actions">
        <span class="toolbar-title">Actions</span>
        <div class="button-row">
          <button id="favOnlyBtn" class="toggle-btn" type="button">Fav</button>
          <button id="themeBtn" class="btn subtle" type="button">Theme</button>
          <button id="syncSheetBtn" class="btn" type="button">Sync</button>
          <label class="btn blue file-btn" for="csvInput">Import</label>
          <button id="exportFilteredBtn" class="btn blue" type="button">Filter</button>
          <button id="exportAllBtn" class="btn green" type="button">Export</button>
        </div>
        <input id="csvInput" type="file" accept=".csv,text/csv">
      </div>
    </section>

    <section class="meta">
      <span id="projectCount">0 projects</span>
      <span id="recentPill" class="pill">Ready</span>
    </section>

    <section class="list-panel">
      <div class="list-header desktop-only">
        <span>Fav</span>
        <button class="sort-btn" data-sort="number" type="button">Project Number</button>
        <button class="sort-btn" data-sort="name" type="button">Project Name</button>
        <button class="sort-btn" data-sort="path" type="button">Project Path</button>
        <span>Actions</span>
      </div>
      <div id="projectList" class="project-list" aria-live="polite"></div>
    </section>
  </div>

  <template id="projectRowTemplate">
    <article class="project-row">
      <button class="favorite-btn" type="button" aria-label="Toggle favorite">☆</button>
      <div class="project-main">
        <div class="row-top">
          <strong class="project-number"></strong>
          <span class="project-name"></span>
        </div>
        <p class="project-path"></p>
      </div>
      <div class="row-actions">
        <button class="btn subtle small copy-btn" type="button">Copy</button>
      </div>
    </article>
  </template>

  <p id="statusMsg" class="status global-status" hidden></p>

  <script src="./app.js" defer></script>
</body>
</html>
